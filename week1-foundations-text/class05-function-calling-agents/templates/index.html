<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Wordle Game Master — Play Wordle with Gemini</title>
  
  <!-- SEO & Meta Tags -->
  <meta name="description" content="A high-fidelity Wordle-style game featuring an agentic AI Game Master powered by Gemini. View live hints, custom chats, and smart play commentary.">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.3">
</head>
<body>
  <!-- Mode Selection Overlay Menu -->
  <div id="menu-overlay" class="menu-overlay">
    <div class="menu-card">
      <div class="menu-header">
        <h2 class="menu-logo">AI WORDLE <span class="menu-badge">AGENT v2.5</span></h2>
        <p class="menu-subtitle">Choose your gameplay environment to begin:</p>
      </div>

      <div class="menu-options">
        <!-- Normal Mode Card -->
        <button class="menu-option-card" id="btn-mode-normal">
          <div class="option-icon">👤</div>
          <div class="option-details">
            <h3 class="option-title">Normal Mode</h3>
            <p class="option-desc">Play traditional Wordle. Assisted by live Gemini AI comments and conversational narrative.</p>
          </div>
        </button>

        <!-- Hard Mode Card -->
        <button class="menu-option-card" id="btn-mode-hard">
          <div class="option-icon">⚔️</div>
          <div class="option-details">
            <h3 class="option-title">Hard Mode</h3>
            <p class="option-desc">Strict logical constraints. Any clues (green correct, yellow present, or grey absent) must be respected in future guesses.</p>
          </div>
        </button>

        <!-- AI Mode Card -->
        <button class="menu-option-card" id="btn-mode-ai">
          <div class="option-icon">🤖</div>
          <div class="option-details">
            <h3 class="option-title">Autonomous AI Mode</h3>
            <p class="option-desc">Relax and watch Gemini formulate strategic guesses autonomously to solve the board as fast as possible.</p>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Game Header -->
  <header>
    <h1>AI WORDLE <span class="badge">AGENT v2.5</span></h1>
  </header>

  <!-- Main Game Container -->
  <main class="app-container">
    
    <!-- Left Column: Traditional Wordle gameplay -->
    <section class="game-panel">
      <!-- Game Controls (Menu Navigation & Active Status) -->
      <div class="game-controls">
        <button id="btn-change-mode" class="btn-change-mode">🏠 Change Mode</button>
        <span id="current-mode-display" class="mode-badge-status normal">👤 Normal Mode</span>
      </div>

      <!-- AI Play Control Center (Only visible when AI Mode is active) -->
      <div id="ai-control-center" class="ai-controls-panel" style="display: none;">
        <button id="btn-ai-step" class="btn-ai-action">🤖 Let AI Guess</button>
        <label class="autoplay-container">
          <input type="checkbox" id="autoplay-toggle" checked>
          <span class="autoplay-label">Auto-Play</span>
        </label>
      </div>

      <!-- Error / Notification banner -->
      <div id="toast-message" class="toast">Invalid Word</div>
      
      <!-- Wordle Letter Grid (6 rows of 5 letters) -->
      <div class="grid-container" id="wordle-grid">
        <!-- Row 1 -->
        <div class="grid-row" id="row-0">
          <div class="tile" id="tile-0-0"></div>
          <div class="tile" id="tile-0-1"></div>
          <div class="tile" id="tile-0-2"></div>
          <div class="tile" id="tile-0-3"></div>
          <div class="tile" id="tile-0-4"></div>
        </div>
        <!-- Row 2 -->
        <div class="grid-row" id="row-1">
          <div class="tile" id="tile-1-0"></div>
          <div class="tile" id="tile-1-1"></div>
          <div class="tile" id="tile-1-2"></div>
          <div class="tile" id="tile-1-3"></div>
          <div class="tile" id="tile-1-4"></div>
        </div>
        <!-- Row 3 -->
        <div class="grid-row" id="row-2">
          <div class="tile" id="tile-2-0"></div>
          <div class="tile" id="tile-2-1"></div>
          <div class="tile" id="tile-2-2"></div>
          <div class="tile" id="tile-2-3"></div>
          <div class="tile" id="tile-2-4"></div>
        </div>
        <!-- Row 4 -->
        <div class="grid-row" id="row-3">
          <div class="tile" id="tile-3-0"></div>
          <div class="tile" id="tile-3-1"></div>
          <div class="tile" id="tile-3-2"></div>
          <div class="tile" id="tile-3-3"></div>
          <div class="tile" id="tile-3-4"></div>
        </div>
        <!-- Row 5 -->
        <div class="grid-row" id="row-4">
          <div class="tile" id="tile-4-0"></div>
          <div class="tile" id="tile-4-1"></div>
          <div class="tile" id="tile-4-2"></div>
          <div class="tile" id="tile-4-3"></div>
          <div class="tile" id="tile-4-4"></div>
        </div>
        <!-- Row 6 -->
        <div class="grid-row" id="row-5">
          <div class="tile" id="tile-5-0"></div>
          <div class="tile" id="tile-5-1"></div>
          <div class="tile" id="tile-5-2"></div>
          <div class="tile" id="tile-5-3"></div>
          <div class="tile" id="tile-5-4"></div>
        </div>
      </div>

      <!-- Tactile Virtual Keyboard (QWERTY Layout) -->
      <div class="keyboard-container" id="keyboard">
        <!-- Row 1 -->
        <div class="keyboard-row">
          <button class="key" data-key="Q">Q</button>
          <button class="key" data-key="W">W</button>
          <button class="key" data-key="E">E</button>
          <button class="key" data-key="R">R</button>
          <button class="key" data-key="T">T</button>
          <button class="key" data-key="Y">Y</button>
          <button class="key" data-key="U">U</button>
          <button class="key" data-key="I">I</button>
          <button class="key" data-key="O">O</button>
          <button class="key" data-key="P">P</button>
        </div>
        <!-- Row 2 -->
        <div class="keyboard-row">
          <button class="key" data-key="A">A</button>
          <button class="key" data-key="S">S</button>
          <button class="key" data-key="D">D</button>
          <button class="key" data-key="F">F</button>
          <button class="key" data-key="G">G</button>
          <button class="key" data-key="H">H</button>
          <button class="key" data-key="J">J</button>
          <button class="key" data-key="K">K</button>
          <button class="key" data-key="L">L</button>
        </div>
        <!-- Row 3 -->
        <div class="keyboard-row">
          <button class="key large" data-key="ENTER">Enter</button>
          <button class="key" data-key="Z">Z</button>
          <button class="key" data-key="X">X</button>
          <button class="key" data-key="C">C</button>
          <button class="key" data-key="V">V</button>
          <button class="key" data-key="B">B</button>
          <button class="key" data-key="N">N</button>
          <button class="key" data-key="M">M</button>
          <button class="key large" data-key="BACKSPACE">←</button>
        </div>
      </div>
    </section>

    <!-- Right Column: AI Game Master Chat Sidebar -->
    <aside class="ai-sidebar">
      <!-- Sidebar Header -->
      <div class="sidebar-header">
        <div class="ai-avatar">🤖</div>
        <div class="header-info">
          <h2>Gemini Game Master</h2>
          <span>Active loop online</span>
        </div>
      </div>

      <!-- Chat Dialogue Log -->
      <div class="chat-container" id="chat-box">
        <!-- Messages will be appended dynamically by JavaScript -->
      </div>

      <!-- Live Typing Indicator -->
      <div class="typing-indicator" id="typing-indicator">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </aside>

  </main>

  <!-- Game Over Modal Overlay -->
  <div class="modal-overlay" id="game-over-modal">
    <div class="modal-content" id="modal-content">
      <h2 id="modal-title">Game Completed!</h2>
      
      <div class="secret-word-display">
        The secret word was
        <br>
        <span id="secret-word">?????</span>
      </div>

      <!-- Game Stats -->
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-value" id="stat-guesses">0</div>
          <div class="stat-label">Guesses Used</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-status">None</div>
          <div class="stat-label">Outcome</div>
        </div>
      </div>

      <!-- Action Button -->
      <button class="btn-primary" id="btn-restart">Play Again</button>
    </div>
  </div>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:99;"></canvas>

  <!-- Game Scripts -->
  <script src="{{ url_for('static', filename='js/app.js') }}?v=2.3"></script>
</body>
</html>
